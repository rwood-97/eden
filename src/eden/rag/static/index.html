<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eden — Gardening Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=Instrument+Sans:wght@400;500&family=DM+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f3f8f5;
      --sidebar:     #ffffff;
      --card:        #ffffff;
      --border:      #d8e8df;
      --border-soft: #ecf4ef;
      --ink:         #122118;
      --forest:      #2a6040;
      --sage:        #478a62;
      --leaf:        #72ab88;
      --mist:        #5c7a68;
      --pale:        #9dbfae;
      --user-bg:     #ddf0e6;
      --user-border: #b8d9c5;
    }

    body {
      font-family: 'Instrument Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ──────────────────────────────────────────── */
    #sidebar {
      width: 260px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 28px 20px 22px;
      border-bottom: 1px solid var(--border-soft);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 9px;
      margin-bottom: 4px;
    }

    .brand h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -.03em;
      line-height: 1;
    }

    .brand-badge {
      font-size: .62rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--sidebar);
      background: var(--forest);
      padding: 2px 7px;
      border-radius: 20px;
      margin-bottom: 2px;
    }

    .subtitle {
      font-size: .7rem;
      color: var(--pale);
      letter-spacing: .07em;
      text-transform: uppercase;
    }

    #new-thread-btn {
      margin: 16px 12px 10px;
      padding: 9px 14px;
      background: var(--forest);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .78rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: inherit;
      letter-spacing: .02em;
      transition: background .16s, box-shadow .16s;
      width: calc(100% - 24px);
    }
    #new-thread-btn:hover {
      background: var(--sage);
      box-shadow: 0 3px 12px rgba(42,96,64,.2);
    }

    .sidebar-label {
      padding: 14px 20px 5px;
      font-size: .62rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--pale);
    }

    #thread-list {
      flex: 1;
      overflow-y: auto;
      padding: 3px 10px 16px;
    }
    #thread-list::-webkit-scrollbar { width: 2px; }
    #thread-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .thread-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 7px;
      cursor: pointer;
      color: var(--mist);
      font-size: .79rem;
      transition: background .12s, color .12s;
      border: 1px solid transparent;
    }
    .thread-item:hover { background: var(--bg); color: var(--ink); }
    .thread-item.active {
      background: var(--bg);
      border-color: var(--border);
      color: var(--ink);
      font-weight: 500;
    }

    .thread-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
      transition: border-color .12s, background .12s;
    }
    .thread-item.active .thread-dot { background: var(--leaf); border-color: var(--leaf); }

    .thread-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .thread-delete {
      display: none;
      background: none;
      border: none;
      color: var(--pale);
      cursor: pointer;
      font-size: .68rem;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      flex-shrink: 0;
      transition: background .1s, color .1s;
    }
    .thread-item:hover .thread-delete { display: block; }
    .thread-delete:hover { background: #fde8e8; color: #b03030; }

    /* ── Main ─────────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 44px 56px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #chat::-webkit-scrollbar { width: 3px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      max-width: 68%;
      padding: 13px 17px;
      border-radius: 14px;
      line-height: 1.7;
      font-size: .875rem;
      animation: up .2s cubic-bezier(.22,.61,.36,1) both;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      background: var(--user-bg);
      color: var(--ink);
      border: 1px solid var(--user-border);
      border-bottom-right-radius: 3px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: var(--card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
      color: var(--ink);
      box-shadow: 0 1px 6px rgba(18,33,24,.05);
    }
    .msg.assistant p { margin-bottom: .55em; }
    .msg.assistant p:last-child { margin-bottom: 0; }
    .msg.assistant ul, .msg.assistant ol { padding-left: 1.4em; margin-bottom: .55em; }
    .msg.assistant li { margin-bottom: .2em; }
    .msg.assistant h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--forest);
      margin-top: .6em;
      margin-bottom: .3em;
    }
    .msg.assistant h3 {
      font-size: .875rem;
      font-weight: 500;
      color: var(--mist);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-top: .5em;
      margin-bottom: .25em;
    }
    .msg.assistant strong { font-weight: 500; color: var(--forest); }
    .msg.assistant a { color: var(--sage); }
    .msg.assistant em { color: var(--mist); }
    .msg.assistant code {
      font-family: 'DM Mono', monospace;
      font-size: .81em;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 4px;
      color: var(--sage);
    }
    .msg.assistant pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin: .5em 0;
      overflow-x: auto;
    }
    .msg.assistant pre code { background: none; border: none; padding: 0; }

    /* Thinking */
    .msg.thinking {
      align-self: flex-start;
      background: var(--card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
      color: var(--pale);
      font-size: .82rem;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      animation: up .2s cubic-bezier(.22,.61,.36,1) both;
    }

    .thinking-trace {
      align-self: flex-start;
      max-width: 68%;
      margin-bottom: -4px;
      animation: up .2s cubic-bezier(.22,.61,.36,1) both;
    }
    .thinking-trace details {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: .77rem;
      overflow: hidden;
    }
    .thinking-trace summary {
      padding: 8px 12px;
      cursor: pointer;
      color: var(--mist);
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .thinking-trace summary::-webkit-details-marker { display: none; }
    .thinking-trace summary::before {
      content: '▶';
      font-size: .5rem;
      transition: transform .15s;
      color: var(--pale);
    }
    .thinking-trace details[open] summary::before { transform: rotate(90deg); }
    .thinking-trace pre {
      margin: 0;
      padding: 10px 14px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--mist);
      border-top: 1px solid var(--border-soft);
      font-family: 'DM Mono', monospace;
      font-size: .75rem;
      line-height: 1.6;
      background: var(--bg);
    }

    .dots { display: flex; gap: 4px; align-items: center; }
    .dots span {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--leaf);
      display: inline-block;
      animation: blink 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%, 100% { opacity: .2; transform: scale(.8); }
      50%       { opacity: 1; transform: scale(1); }
    }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      user-select: none;
    }
    #empty-state .empty-icon { color: var(--border); }
    #empty-state .empty-label {
      font-family: 'Fraunces', serif;
      font-size: 1.15rem;
      font-weight: 300;
      color: var(--mist);
      letter-spacing: -.01em;
    }
    #empty-state .empty-sub {
      font-size: .74rem;
      color: var(--pale);
      letter-spacing: .04em;
    }

    /* ── Footer ───────────────────────────────────────────── */
    footer {
      padding: 14px 56px 24px;
      background: var(--bg);
      border-top: 1px solid var(--border-soft);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 15px;
      font-size: .875rem;
      font-family: inherit;
      line-height: 1.6;
      max-height: 160px;
      outline: none;
      background: var(--card);
      color: var(--ink);
      transition: border-color .16s, box-shadow .16s;
    }
    textarea::placeholder { color: var(--pale); }
    textarea:focus {
      border-color: var(--leaf);
      box-shadow: 0 0 0 3px rgba(114,171,136,.14);
    }

    #send-btn {
      background: var(--forest);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px 22px;
      font-size: .78rem;
      font-weight: 500;
      font-family: inherit;
      letter-spacing: .05em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background .16s, box-shadow .16s, transform .1s;
      width: 100%;
    }
    #send-btn:hover {
      background: var(--sage);
      box-shadow: 0 4px 16px rgba(42,96,64,.22);
    }
    #send-btn:active { transform: scale(.96); }
    #send-btn:disabled { opacity: .3; cursor: default; transform: none; box-shadow: none; }
  </style>
</head>
<body>

  <div id="auth-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:2rem;width:320px;display:flex;flex-direction:column;gap:1rem;">
      <h2 style="margin:0;font-size:1.2rem;color:#e8e8e8;">Eden</h2>
      <p style="margin:0;color:#888;font-size:0.9rem;">Enter password to continue</p>
      <input id="auth-input" type="password" placeholder="Password" autofocus
        style="padding:0.6rem 0.8rem;border-radius:8px;border:1px solid #444;background:#111;color:#e8e8e8;font-size:1rem;outline:none;" />
      <p id="auth-error" style="margin:0;color:#e05;font-size:0.85rem;display:none;">Incorrect password</p>
      <button id="auth-btn"
        style="padding:0.6rem;border-radius:8px;border:none;background:#4a7c59;color:#fff;font-size:1rem;cursor:pointer;">Unlock</button>
    </div>
  </div>

  <nav id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <h1>Eden</h1>
        <span class="brand-badge">Beta</span>
      </div>
      <div class="subtitle">Gardening assistant</div>
    </div>

    <button id="new-thread-btn">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
        <path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      New chat
    </button>

    <div class="sidebar-label">Recent</div>
    <div id="thread-list"></div>
  </nav>

  <div id="main">
    <div id="chat"></div>
    <footer>
      <textarea id="input" rows="1" placeholder="Ask about plants, pests, soil, or garden care…"></textarea>
      <button id="send-btn">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M1 6.5h11M7 1.5l5 5-5 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Send
      </button>
    </footer>
  </div>

  <script>
    const STORAGE_KEY = 'eden_threads';

    function loadThreads() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }

    function saveThreads(t) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(t));
    }

    let threads = loadThreads();
    let activeId = null;

    const chatEl       = document.getElementById('chat');
    const inputEl      = document.getElementById('input');
    const sendBtn      = document.getElementById('send-btn');
    const threadList   = document.getElementById('thread-list');
    const newThreadBtn = document.getElementById('new-thread-btn');

    function createThread() {
      const id = crypto.randomUUID();
      threads[id] = { name: 'New Chat', messages: [] };
      saveThreads(threads);
      return id;
    }

    function switchThread(id) {
      activeId = id;
      renderSidebar();
      renderChat();
      inputEl.focus();
    }

    function deleteThread(id) {
      delete threads[id];
      saveThreads(threads);
      if (activeId === id) {
        const ids = Object.keys(threads);
        activeId = ids.length ? ids[ids.length - 1] : null;
      }
      renderSidebar();
      renderChat();
    }

    function setThreadName(id, text) {
      if (threads[id]) {
        threads[id].name = text.slice(0, 40) || 'New Chat';
        saveThreads(threads);
      }
    }

    function renderSidebar() {
      threadList.innerHTML = '';
      const ids = Object.keys(threads);
      for (let i = ids.length - 1; i >= 0; i--) {
        const id = ids[i];
        const t  = threads[id];
        const item = document.createElement('div');
        item.className = 'thread-item' + (id === activeId ? ' active' : '');
        item.innerHTML = `<span class="thread-dot"></span>
          <span class="thread-name">${escapeHtml(t.name)}</span>
          <button class="thread-delete" title="Delete">✕</button>`;
        item.addEventListener('click', () => switchThread(id));
        item.querySelector('.thread-delete').addEventListener('click', e => {
          e.stopPropagation(); deleteThread(id);
        });
        threadList.appendChild(item);
      }
    }

    function makeThinkingTrace(text) {
      const wrap = document.createElement('div');
      wrap.className = 'thinking-trace';
      wrap.innerHTML = `<details><summary>Thinking</summary><pre>${escapeHtml(text)}</pre></details>`;
      return wrap;
    }

    function renderChat() {
      chatEl.innerHTML = '';
      if (!activeId || !threads[activeId]) {
        chatEl.innerHTML = `
          <div id="empty-state">
            <svg class="empty-icon" width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="26" cy="26" r="25" stroke="currentColor" stroke-width="1.2"/>
              <path d="M26 38V24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M26 30C26 30 19 26 16 18C23 16 29 21 26 30Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" fill="none"/>
              <path d="M26 27C26 27 32 21 37 15C30 14 26 21 26 27Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" fill="none"/>
            </svg>
            <span class="empty-label">What's growing today?</span>
            <span class="empty-sub">Plants · pests · soil · seasons</span>
          </div>`;
        return;
      }
      for (const msg of threads[activeId].messages) {
        if (msg.role === 'thinking') {
          chatEl.appendChild(makeThinkingTrace(msg.html));
        } else {
          const el = document.createElement('div');
          el.className = `msg ${msg.role}`;
          el.innerHTML = msg.html;
          chatEl.appendChild(el);
        }
      }
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function appendMessage(role, html) {
      threads[activeId].messages.push({ role, html });
      saveThreads(threads);
      let el;
      if (role === 'thinking') {
        el = makeThinkingTrace(html);
      } else {
        el = document.createElement('div');
        el.className = `msg ${role}`;
        el.innerHTML = html;
      }
      chatEl.appendChild(el);
      chatEl.scrollTop = chatEl.scrollHeight;
      return el;
    }

    function addThinking() {
      const el = document.createElement('div');
      el.className = 'msg thinking';
      el.innerHTML = '<span>Eden is thinking</span><div class="dots"><span></span><span></span><span></span></div>';
      chatEl.appendChild(el);
      chatEl.scrollTop = chatEl.scrollHeight;
      return el;
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text || !activeId) return;
      const threadId = activeId;
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;
      if (threads[threadId].messages.length === 0) {
        setThreadName(threadId, text);
        renderSidebar();
      }
      appendMessage('user', escapeHtml(text));
      const thinkingEl = addThinking();
      let thinkingRemoved = false;
      function removeThinking() {
        if (!thinkingRemoved) { thinkingEl.remove(); thinkingRemoved = true; }
      }

      let assistantEl = null;
      let accText = '';

      try {
        const res = await fetch('/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Password': _password },
          body: JSON.stringify({ message: text, thread_id: threadId }),
        });
        if (!res.ok) throw new Error(`Server error ${res.status}`);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            let event;
            try { event = JSON.parse(line.slice(6)); } catch { continue; }

            const isActive = activeId === threadId;

            if (event.type === 'searching') {
              if (isActive) thinkingEl.querySelector('span').textContent = `Searching: ${event.query}`;
            } else if (event.type === 'token') {
              accText += event.content;
              if (isActive) {
                if (!assistantEl || !assistantEl.isConnected) {
                  removeThinking();
                  assistantEl = document.createElement('div');
                  assistantEl.className = 'msg assistant';
                  assistantEl.style.animation = 'up .2s cubic-bezier(.22,.61,.36,1) both';
                  chatEl.appendChild(assistantEl);
                }
                assistantEl.innerHTML = marked.parse(accText);
                chatEl.scrollTop = chatEl.scrollHeight;
              }
            } else if (event.type === 'thinking') {
              if (isActive) {
                const traceEl = makeThinkingTrace(event.content);
                const ref = assistantEl && assistantEl.isConnected ? assistantEl : null;
                chatEl.insertBefore(traceEl, ref);
              }
              threads[threadId].messages.push({ role: 'thinking', html: event.content });
              saveThreads(threads);
            } else if (event.type === 'done') {
              removeThinking();
              if (accText) {
                threads[threadId].messages.push({ role: 'assistant', html: marked.parse(accText) });
                saveThreads(threads);
                if (isActive && (!assistantEl || !assistantEl.isConnected)) {
                  const el = document.createElement('div');
                  el.className = 'msg assistant';
                  chatEl.appendChild(el);
                  el.innerHTML = marked.parse(accText);
                  chatEl.scrollTop = chatEl.scrollHeight;
                }
              }
            }
          }
        }
      } catch (err) {
        removeThinking();
        if (activeId === threadId) {
          appendMessage('assistant', `<em style="color:#b03030">Error: ${escapeHtml(err.message)}</em>`);
        }
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    newThreadBtn.addEventListener('click', () => { switchThread(createThread()); });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = inputEl.scrollHeight + 'px';
    });

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    sendBtn.addEventListener('click', send);

    const existingIds = Object.keys(threads);
    activeId = existingIds.length ? existingIds[existingIds.length - 1] : createThread();
    renderSidebar();
    renderChat();
    inputEl.focus();

    // --- Auth ---
    let _password = sessionStorage.getItem('eden_pw') || '';
    const overlay = document.getElementById('auth-overlay');
    const authInput = document.getElementById('auth-input');
    const authBtn = document.getElementById('auth-btn');
    const authError = document.getElementById('auth-error');

    async function tryAuth(pw) {
      const res = await fetch('/auth', { method: 'POST', headers: { 'X-Password': pw } });
      return res.ok;
    }

    async function initAuth() {
      if (_password && await tryAuth(_password)) { overlay.style.display = 'none'; return; }
      _password = '';
      sessionStorage.removeItem('eden_pw');
      overlay.style.display = 'flex';
      authInput.focus();
    }

    async function submitAuth() {
      const pw = authInput.value;
      if (!pw) return;
      if (await tryAuth(pw)) {
        _password = pw;
        sessionStorage.setItem('eden_pw', pw);
        overlay.style.display = 'none';
        authError.style.display = 'none';
      } else {
        authError.style.display = 'block';
        authInput.select();
      }
    }

    authBtn.addEventListener('click', submitAuth);
    authInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitAuth(); });
    initAuth();
  </script>
</body>
</html>
