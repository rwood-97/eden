<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eden — Gardening Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f7f2;
      color: #1a2e1a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #2d6a2d;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
      flex-shrink: 0;
      z-index: 10;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: .02em; }
    header .subtitle { font-size: .8rem; opacity: .75; }

    #app {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    #sidebar {
      width: 220px;
      background: #1e4d1e;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    #new-thread-btn {
      margin: 10px;
      padding: 8px 12px;
      background: #2d6a2d;
      color: #fff;
      border: 1px solid #4a8a4a;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: background .15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #new-thread-btn:hover { background: #3a7a3a; }

    #thread-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 6px;
    }
    #thread-list::-webkit-scrollbar { width: 4px; }
    #thread-list::-webkit-scrollbar-thumb { background: #3a6a3a; border-radius: 2px; }

    .thread-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 7px;
      cursor: pointer;
      color: #c8dfc8;
      font-size: .83rem;
      transition: background .12s;
      position: relative;
    }
    .thread-item:hover { background: #2d5a2d; }
    .thread-item.active { background: #2d6a2d; color: #fff; }

    .thread-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .thread-delete {
      display: none;
      background: none;
      border: none;
      color: #a8caa8;
      cursor: pointer;
      font-size: .9rem;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
    }
    .thread-item:hover .thread-delete { display: block; }
    .thread-delete:hover { color: #ff9999; }

    /* Main chat area */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.55;
      font-size: .93rem;
    }
    .msg.user {
      align-self: flex-end;
      background: #2d6a2d;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #d4e6d4;
      border-bottom-left-radius: 4px;
    }
    .msg.assistant p { margin-bottom: .5em; }
    .msg.assistant p:last-child { margin-bottom: 0; }
    .msg.assistant ul, .msg.assistant ol { padding-left: 1.4em; margin-bottom: .5em; }
    .msg.assistant code {
      background: #f0f5f0;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: .88em;
    }

    .msg.thinking {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #d4e6d4;
      border-bottom-left-radius: 4px;
      color: #6a8f6a;
      font-style: italic;
      font-size: .88rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .thinking-trace {
      align-self: flex-start;
      max-width: 72%;
      margin-bottom: -6px;
    }
    .thinking-trace details {
      background: #f0f7f0;
      border: 1px solid #c8dfc8;
      border-radius: 10px;
      font-size: .82rem;
      overflow: hidden;
    }
    .thinking-trace summary {
      padding: 6px 12px;
      cursor: pointer;
      color: #5a8a5a;
      font-style: italic;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .thinking-trace summary::-webkit-details-marker { display: none; }
    .thinking-trace summary::before {
      content: '▶';
      font-size: .7rem;
      transition: transform .15s;
    }
    .thinking-trace details[open] summary::before { transform: rotate(90deg); }
    .thinking-trace pre {
      margin: 0;
      padding: 8px 12px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #4a6a4a;
      border-top: 1px solid #c8dfc8;
      font-family: inherit;
      font-size: .81rem;
      line-height: 1.5;
    }
    .dots span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #5a9a5a;
      animation: bounce .9s infinite;
    }
    .dots span:nth-child(2) { animation-delay: .15s; }
    .dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }

    #empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8aaa8a;
      font-size: .95rem;
      font-style: italic;
    }

    footer {
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #d4e6d4;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    textarea {
      flex: 1;
      resize: none;
      border: 1px solid #c4d9c4;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: .93rem;
      font-family: inherit;
      line-height: 1.45;
      max-height: 140px;
      outline: none;
      transition: border-color .15s;
    }
    textarea:focus { border-color: #2d6a2d; }

    button#send-btn {
      background: #2d6a2d;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 9px 18px;
      font-size: .93rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    button#send-btn:hover { background: #245524; }
    button#send-btn:disabled { background: #8ab88a; cursor: default; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>🌿 Eden</h1>
      <div class="subtitle">Gardening Assistant</div>
    </div>
  </header>

  <div id="app">
    <nav id="sidebar">
      <button id="new-thread-btn">&#43; New Chat</button>
      <div id="thread-list"></div>
    </nav>

    <div id="main">
      <div id="chat"></div>
      <footer>
        <textarea id="input" rows="1" placeholder="Ask me anything about plants, pests, or gardening…"></textarea>
        <button id="send-btn">Send</button>
      </footer>
    </div>
  </div>

  <script>
    // ── Storage helpers ──────────────────────────────────────────────────────
    const STORAGE_KEY = 'eden_threads';

    function loadThreads() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }

    function saveThreads(threads) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(threads));
    }

    // ── State ────────────────────────────────────────────────────────────────
    let threads = loadThreads();       // { [id]: { name, messages: [{role, html}] } }
    let activeId = null;

    // ── DOM refs ─────────────────────────────────────────────────────────────
    const chatEl       = document.getElementById('chat');
    const inputEl      = document.getElementById('input');
    const sendBtn      = document.getElementById('send-btn');
    const threadList   = document.getElementById('thread-list');
    const newThreadBtn = document.getElementById('new-thread-btn');

    // ── Thread management ────────────────────────────────────────────────────
    function createThread() {
      const id = crypto.randomUUID();
      threads[id] = { name: 'New Chat', messages: [] };
      saveThreads(threads);
      return id;
    }

    function switchThread(id) {
      activeId = id;
      renderSidebar();
      renderChat();
      inputEl.focus();
    }

    function deleteThread(id) {
      delete threads[id];
      saveThreads(threads);
      if (activeId === id) {
        const ids = Object.keys(threads);
        activeId = ids.length ? ids[ids.length - 1] : null;
      }
      renderSidebar();
      renderChat();
    }

    function setThreadName(id, text) {
      if (threads[id]) {
        threads[id].name = text.slice(0, 40) || 'New Chat';
        saveThreads(threads);
      }
    }

    // ── Render sidebar ───────────────────────────────────────────────────────
    function renderSidebar() {
      threadList.innerHTML = '';
      const ids = Object.keys(threads);
      // Show newest first
      for (let i = ids.length - 1; i >= 0; i--) {
        const id = ids[i];
        const t  = threads[id];
        const item = document.createElement('div');
        item.className = 'thread-item' + (id === activeId ? ' active' : '');
        item.innerHTML = `<span class="thread-name">${escapeHtml(t.name)}</span>
          <button class="thread-delete" title="Delete">✕</button>`;
        item.addEventListener('click', () => switchThread(id));
        item.querySelector('.thread-delete').addEventListener('click', e => {
          e.stopPropagation();
          deleteThread(id);
        });
        threadList.appendChild(item);
      }
    }

    // ── Render chat ──────────────────────────────────────────────────────────
    function makeThinkingTrace(text) {
      const wrap = document.createElement('div');
      wrap.className = 'thinking-trace';
      wrap.innerHTML = `<details><summary>Thinking</summary><pre>${escapeHtml(text)}</pre></details>`;
      return wrap;
    }

    function renderChat() {
      chatEl.innerHTML = '';
      if (!activeId || !threads[activeId]) {
        chatEl.innerHTML = '<div id="empty-state">Select or start a chat</div>';
        return;
      }
      for (const msg of threads[activeId].messages) {
        if (msg.role === 'thinking') {
          chatEl.appendChild(makeThinkingTrace(msg.html));
        } else {
          const el = document.createElement('div');
          el.className = `msg ${msg.role}`;
          el.innerHTML = msg.html;
          chatEl.appendChild(el);
        }
      }
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    // ── Messaging ────────────────────────────────────────────────────────────
    function appendMessage(role, html) {
      threads[activeId].messages.push({ role, html });
      saveThreads(threads);
      let el;
      if (role === 'thinking') {
        el = makeThinkingTrace(html);
      } else {
        el = document.createElement('div');
        el.className = `msg ${role}`;
        el.innerHTML = html;
      }
      chatEl.appendChild(el);
      chatEl.scrollTop = chatEl.scrollHeight;
      return el;
    }

    function addThinking() {
      const el = document.createElement('div');
      el.className = 'msg thinking';
      el.innerHTML = '<span>Eden is thinking</span><div class="dots"><span></span><span></span><span></span></div>';
      chatEl.appendChild(el);
      chatEl.scrollTop = chatEl.scrollHeight;
      return el;
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text || !activeId) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      // Name the thread from the first message
      if (threads[activeId].messages.length === 0) {
        setThreadName(activeId, text);
        renderSidebar();
      }

      appendMessage('user', escapeHtml(text));
      const thinking = addThinking();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, thread_id: activeId }),
        });
        if (!res.ok) throw new Error(`Server error ${res.status}`);
        const data = await res.json();
        thinking.remove();
        if (data.thinking) appendMessage('thinking', data.thinking);
        appendMessage('assistant', marked.parse(data.reply));
      } catch (err) {
        thinking.remove();
        appendMessage('assistant', `<em style="color:#c0392b">Error: ${escapeHtml(err.message)}</em>`);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Event listeners ──────────────────────────────────────────────────────
    newThreadBtn.addEventListener('click', () => {
      const id = createThread();
      switchThread(id);
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = inputEl.scrollHeight + 'px';
    });

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    sendBtn.addEventListener('click', send);

    // ── Init ─────────────────────────────────────────────────────────────────
    const existingIds = Object.keys(threads);
    if (existingIds.length === 0) {
      // Start with one thread
      activeId = createThread();
    } else {
      activeId = existingIds[existingIds.length - 1];
    }
    renderSidebar();
    renderChat();
    inputEl.focus();
  </script>
</body>
</html>
